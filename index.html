
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>F-Wannabes Picker - Smart Rankings</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  max-width: 600px;
  margin: auto;
}

h1 { text-align: center; }

.driver-row {
  display: flex;
  justify-content: space-between;
  margin: 5px 0;
  padding: 10px;
  border-radius: 5px;
  color: white;
}

select {
  padding: 5px;
  font-weight: bold;
}

select option:checked {
  background: #00aa44;
  color: white;
  font-weight: bold;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 15px;
  font-size: 16px;
  cursor: pointer;
}

button:disabled {
  background: #555;
  cursor: not-allowed;
}

/* SUCCESS POPUP */

.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.75);
  z-index: 999;
}

.popup-content {
  background: #00aa44;
  color: white;
  padding: 40px 60px;
  font-size: 28px;
  font-weight: bold;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 0 25px rgba(0,0,0,0.5);
  animation: popupFade 0.4s ease;
}

.checkmark {
  font-size: 60px;
  display: block;
  margin-bottom: 10px;
  animation: pop 0.4s ease;
}

@keyframes popupFade {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

@keyframes pop {
  0% { transform: scale(0.5); opacity: 0; }
  80% { transform: scale(1.2); }
  100% { transform: scale(1); opacity: 1; }
}
</style>
</head>
<body>

<h1>F-Wannabes Picker</h1>
<input type="text" id="name" placeholder="Team Name">

<p>Select a rank (1 = 1st, 22 = last) for each driver:</p>

<div id="driverList"></div>

<button id="submitBtn" onclick="submitRanking()">Submit Ranking</button>

<div id="successPopup" class="popup">
  <div class="popup-content">
    <span class="checkmark">✔</span>
    Submitted Successfully!
  </div>
</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbwV4RuRmKF72xmqfH5FTocyGeOgkWccxJU1D__wx8X_c3uCOwa61fySgq70Con6kzcN/exec";

const drivers = [
  "Pierre Gasly - Alpine","Franco Colapinto - Alpine","Fernando Alonso - Aston Martin","Lance Stroll - Aston Martin",
  "Nico Hulkenberg - Audi","Gabriel Bortoleto - Audi","Sergio Perez - Cadillac","Valtteri Bottas - Cadillac",
  "Charles Leclerc - Ferrari","Lewis Hamilton - Ferrari","Esteban Ocon - Haas","Oliver Bearman - Haas",
  "Lando Norris - McLaren","Oscar Piastri - McLaren","George Russell - Mercedes","Kimi Antonelli - Mercedes",
  "Liam Lawson - Racing Bulls","Arvid Lindblad - Racing Bulls","Max Verstappen - Red Bull",
  "Isack Hadjar - Red Bull","Carlos Sainz - Williams","Alex Albon - Williams"
];

// Team colors
const teamColors = {
  "Mercedes": "#27F4D2",
  "Red Bull": "#3671C6",
  "Ferrari": "#ED1131",
  "McLaren": "#FF8000",
  "Alpine": "#00A1E8",
  "Racing Bulls": "#6692FF",
  "Aston Martin": "#229971",
  "Williams": "#1868DB",
  "Haas": "#DEE1E2",
  "Audi": "#FF2D00",
  "Cadillac": "#AAAAAD"
};

const driverList = document.getElementById("driverList");
const selects = [];

// Create driver rows
drivers.forEach(driver => {

  const row = document.createElement("div");
  row.className = "driver-row";

  const label = document.createElement("span");
  label.textContent = driver;

  const teamName = driver.split(" - ")[1];
  row.style.background = teamColors[teamName] || "#e10600";
  if (teamName === "Haas") row.style.color = "black";

  const select = document.createElement("select");

  const defaultOption = document.createElement("option");
  defaultOption.value = "";
  defaultOption.textContent = "Select";
  select.appendChild(defaultOption);

  for (let i = 1; i <= drivers.length; i++) {
    const option = document.createElement("option");
    option.value = i;
    option.textContent = i;
    select.appendChild(option);
  }

  row.appendChild(label);
  row.appendChild(select);

  driverList.appendChild(row);
  selects.push(select);

});

function updateDropdowns() {

  const chosen = new Set();

  selects.forEach(sel => {
    if (sel.value !== "") chosen.add(sel.value);
  });

  selects.forEach(sel => {

    const currentValue = sel.value;

    Array.from(sel.options).forEach(opt => {

      if (opt.value === "") return;

      if (opt.value !== currentValue && chosen.has(opt.value)) {
        opt.disabled = true;
      } else {
        opt.disabled = false;
      }

    });

  });

}

document.addEventListener("change", updateDropdowns);

function submitRanking() {

  const submitBtn = document.getElementById("submitBtn");
  submitBtn.disabled = true;

  const name = document.getElementById("name").value.trim();

  if (!name) {
    alert("Please enter your name");
    submitBtn.disabled = false;
    return;
  }

  const ranking = [];
  let allFilled = true;

  selects.forEach(sel => {
    if (sel.value === "") allFilled = false;
    ranking.push(sel.value ? parseInt(sel.value) : 0);
  });

  if (!allFilled) {
    alert("Please assign a rank to every driver.");
    submitBtn.disabled = false;
    return;
  }

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify({ name, ranking })
  })
  .then(res => res.json())
  .then(data => {

    const popup = document.getElementById("successPopup");
    popup.style.display = "flex";

    setTimeout(() => {
      popup.style.display = "none";
    }, 3000);

  })
  .catch(err => {
    alert("Error submitting. Please try again.");
    submitBtn.disabled = false;
    console.error(err);
  });

}

</script>

</body>
</html>
